<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girouette Bus</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

/* Pages */
.page { display: none; padding: 20px; }
.active { display: block; }

/* Accueil */
.center {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

input, button {
    padding: 12px;
    margin: 8px;
    font-size: 16px;
    width: 260px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Écran */
.screen {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.2);
}

/* Haut */
.top {
    color: red;
    font-weight: bold;
    white-space: pre-line;
}

/* Ligne */
.line-container {
    position: relative;
    margin: 50px 0;
}

.line {
    height: 4px;
    background: black;
}

.stop {
    position: absolute;
    transform: translateX(-50%);
    text-align: center;
    font-size: 12px;
}

.dot {
    width: 10px;
    height: 10px;
    background: black;
    border-radius: 50%;
    margin: auto;
}

.triangle {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 14px solid red;
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    top: -7px;
    transition: left 0.5s ease;
}

/* Texte principal */
.big {
    font-size: 28px;
    font-weight: bold;
}

/* Scroll */
.scroll {
    overflow: hidden;
    white-space: nowrap;
}

.scroll span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 8s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* Footer */
.footer {
    margin-top: 40px;
    font-size: 13px;
}
</style>
</head>

<body>

<!-- ACCUEIL -->
<div id="home" class="page active center">
    <h2>Entrer le code</h2>
    <input type="text" id="codeInput">
    <button id="validateBtn">Valider</button>
</div>

<!-- RÉGLAGES -->
<div id="settings" class="page">
    <h2>Réglages</h2>

    <input id="line" placeholder="Numéro ligne">
    <input id="destination" placeholder="Destination">
    <input id="direction" placeholder="Direction">

    <h3>Arrêts</h3>
    <div id="stopsList"></div>
    <button onclick="addStop()">Ajouter arrêt</button>

    <h3>Position actuelle</h3>
    <input type="number" id="currentIndex">

    <h3>GPS</h3>
    <button onclick="useGPS()">Utiliser ma position</button>

    <br><br>
    <button onclick="save()">Sauvegarder</button>
    <button onclick="go('display'); renderDisplay();">Voir affichage</button>
</div>

<!-- AFFICHAGE -->
<div id="display" class="page">
    <div class="screen">
        <div class="top" id="topText"></div>

        <div class="line-container">
            <div class="line"></div>
            <div id="stops"></div>
            <div class="triangle" id="triangle"></div>
        </div>

        <div class="big scroll">
            <span id="nextStopText"></span>
        </div>

        <div class="footer">
            LA MOBILITÉ DE MACS<br>
            yégo<br>
            www.yego.fr<br>
            Application yégo<br>
            @yego.macs
        </div>
    </div>
</div>

<!-- TEST -->
<div id="test" class="page">
    <h2>Mode test</h2>
    <div id="testRender"></div>
</div>

<script>
// DATA
let data = JSON.parse(localStorage.getItem("busData")) || {
    line: "001A",
    destination: "LABENNE - TYROSSE",
    direction: "Vers TYROSSE",
    stops: ["LABENNE", "CAPBRETON", "BENESSE", "TYROSSE"],
    currentIndex: 0
};

// NAVIGATION
function go(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

// LOGIN
document.getElementById("validateBtn").addEventListener("click", checkCode);

document.getElementById("codeInput").addEventListener("keydown", function(e){
    if(e.key === "Enter") checkCode();
});

function checkCode() {
    let code = document.getElementById("codeInput").value.trim();

    if (code === "1953") {
        go("settings");
        loadSettings();
    } 
    else if (code === "girouette") {
        go("display");
        renderDisplay();
    } 
    else if (code === "0000") {
        go("test");
        renderDisplay();
        document.getElementById("testRender").innerHTML =
            document.getElementById("display").innerHTML;
    } 
    else {
        alert("Code incorrect ❌");
    }
}

// SETTINGS
function loadSettings() {
    document.getElementById("line").value = data.line;
    document.getElementById("destination").value = data.destination;
    document.getElementById("direction").value = data.direction;
    document.getElementById("currentIndex").value = data.currentIndex;
    renderStopsList();
}

function save() {
    data.line = document.getElementById("line").value;
    data.destination = document.getElementById("destination").value;
    data.direction = document.getElementById("direction").value;
    data.currentIndex = parseInt(document.getElementById("currentIndex").value);

    localStorage.setItem("busData", JSON.stringify(data));
    alert("Sauvegardé !");
}

function renderStopsList() {
    let container = document.getElementById("stopsList");
    container.innerHTML = "";

    data.stops.forEach((stop, i) => {
        let div = document.createElement("div");
        div.innerHTML = `
            <input value="${stop}" onchange="data.stops[${i}] = this.value">
            <button onclick="data.stops.splice(${i},1); renderStopsList()">❌</button>
        `;
        container.appendChild(div);
    });
}

function addStop() {
    data.stops.push("Nouvel arrêt");
    renderStopsList();
}

// AFFICHAGE
function renderDisplay() {
    document.getElementById("topText").innerText =
        data.line + " " + data.destination + "\n" + data.direction;

    let stopsDiv = document.getElementById("stops");
    stopsDiv.innerHTML = "";

    let width = 100 / (data.stops.length - 1);

    data.stops.forEach((stop, i) => {
        let div = document.createElement("div");
        div.className = "stop";
        div.style.left = (i * width) + "%";
        div.innerHTML = `<div>${stop}</div><div class="dot"></div>`;
        stopsDiv.appendChild(div);
    });

    document.getElementById("triangle").style.left =
        (data.currentIndex * width) + "%";

    let next = data.stops[data.currentIndex + 1] || "TERMINUS";
    document.getElementById("nextStopText").innerText =
        "Prochain arrêt : " + next;
}

// GPS
function useGPS() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(() => {
            data.currentIndex = Math.floor(Math.random() * data.stops.length);
            document.getElementById("currentIndex").value = data.currentIndex;
            alert("Position simulée !");
        });
    } else {
        alert("GPS non disponible");
    }
}
</script>

</body>
</html>
